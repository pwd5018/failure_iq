# This is the local fake web app URL the tests will target.
# Update this if your fake app runs on a different port.
base.url=http://localhost:5173

# Supported values in this simple framework: chrome, edge
browser=chrome

# This controls which repeatable failure pattern the suite should produce.
# Supported values: release-candidate, timing-stress, ui-regression
scenario.profile=release-candidate

# Main timeout used by explicit waits in the page objects
timeout.seconds=10

# Small timeout used in one intentionally flaky/failing timing demo test
short.timeout.seconds=1

# Local folder where the custom FailureIQ JSON output will be saved
output.folder=failureiq-output

# Turn automatic upload on or off
upload.enabled=true

# Local FailureIQ backend API endpoint
failureiq.api.url=http://localhost:8080/api/test-runs

headless=true
