version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: failureiq-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: failureiq
      POSTGRES_USER: failureiq_user
      POSTGRES_PASSWORD: failureiq_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
