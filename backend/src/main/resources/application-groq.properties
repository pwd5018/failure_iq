# Example profile for Groq using its OpenAI-compatible API.
failureiq.ai.enabled=true
failureiq.ai.provider=groq
failureiq.ai.model=llama-3.3-70b-versatile
failureiq.ai.base-url=https://api.groq.com/openai/v1
failureiq.ai.api-key=${GROQ_API_KEY:}
failureiq.ai.timeout-seconds=60
failureiq.ai.summary-style=both
