# Application name shown in logs and metadata.
spring.application.name=failureiq-backend

# PostgreSQL connection settings.
spring.datasource.url=jdbc:postgresql://localhost:5432/failureiq
spring.datasource.username=failureiq_user
spring.datasource.password=failureiq_password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate settings.
# "update" is fine for a simple demo project because Hibernate creates tables for us.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Default server port for the backend API.
server.port=8080

# AI summary configuration.
# Leave enabled=false to use the deterministic fallback summary only.
failureiq.ai.enabled=false

# Supported provider values:
# - fallback
# - local-http
failureiq.ai.provider=local-http

# Optional provider settings used by the local-http provider.
failureiq.ai.model=qwen2.5:3b
failureiq.ai.endpoint=http://127.0.0.1:11434/api/generate
failureiq.ai.api-key=ollama
failureiq.ai.timeout-seconds=20
