# Application name shown in logs and metadata.
spring.application.name=failureiq-backend

# PostgreSQL connection settings.
spring.datasource.url=jdbc:postgresql://localhost:5432/failureiq
spring.datasource.username=failureiq_user
spring.datasource.password=failureiq_password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate settings.
# "update" is fine for a simple demo project because Hibernate creates tables for us.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Default server port for the backend API.
server.port=8080
