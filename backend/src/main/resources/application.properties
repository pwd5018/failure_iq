# Application name shown in logs and metadata.
spring.application.name=failureiq-backend

# PostgreSQL connection settings.
spring.datasource.url=jdbc:postgresql://localhost:5432/failureiq
spring.datasource.username=failureiq_user
spring.datasource.password=failureiq_password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate settings.
# "update" is fine for a simple demo project because Hibernate creates tables for us.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Default server port for the backend API.
server.port=8080

# AI summary configuration.
# Leave enabled=false to use the deterministic fallback summary only.
failureiq.ai.enabled=true

# Supported provider values:
# - fallback
# - ollama
# - groq
# - openai-compatible
failureiq.ai.provider=groq

# Shared OpenAI-compatible provider settings.
# Set the provider to ollama, groq, or openai-compatible to enable AI summaries.
failureiq.ai.model=llama-3.3-70b-versatile
failureiq.ai.base-url=

# The older endpoint property is still supported for backward compatibility.
failureiq.ai.endpoint=https://api.groq.com/openai/v1
failureiq.ai.api-key=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
failureiq.ai.timeout-seconds=60
failureiq.ai.summary-style=both
